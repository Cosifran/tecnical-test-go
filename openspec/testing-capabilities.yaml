# Testing Capabilities — tecnical-test-go
# Generated by sdd-init on 2026-06-19. Persisted to Engram (topic_key: testing-capabilities/tecnical-test-go).

strict_tdd: true
resolved_by: "fallback — no agent marker, no config override, test runner present"

backend:
  language: Go
  version: "1.25.0"
  runner: "go test ./..."
  wrapper_script: "backend/scripts/test.sh"
  style: table-driven
  style_details:
    - "t.Run(tt.name, func(t *testing.T) { ... })"
    - "Pure stdlib assertions (no testify, no gomock)"
    - "net/http/httptest for HTTP handler/middleware tests"
  assertion_library: stdlib
  http_test_helper: net/http/httptest
  coverage:
    tool: "go test -cover"
    enforced: false
    notes: "Coverage tool available; not gated in scripts/test.sh. Add to CI if the 10% testing criterion needs evidence."
  db_test_strategy: "SQLite in-memory (per .env.example: DB_PATH=:memory:)"
  critical_test_files:
    - path: backend/internal/infrastructure/jwt/token_test.go
      covers: "Manual JWT — encode/sign/verify, tampered signature, expired exp, malformed token"
      requirement_ref: "JWT manual (sin librerías externas)"
    - path: backend/internal/application/auth_service_test.go
      covers: "Login success/failure, refresh rotation, deleted-user, table-driven scenarios"
    - path: backend/internal/application/fuel_service_test.go
      covers: "Predictive fuel autonomy <1h alert threshold"
      requirement_ref: "Cálculo predictivo de combustible: <1 hora de autonomía"
    - path: backend/internal/application/masking_test.go
      covers: "Device ID masking DEV-****-XC54 for non-admin role"
      requirement_ref: "Enmascarar IDs de dispositivos"
    - path: backend/internal/application/sensor_service_test.go
      covers: "Sensor ingestion service — persistence + alert emission"
    - path: backend/internal/application/vehicle_service_test.go
      covers: "Vehicle service — list/lookup with role-aware masking"
    - path: backend/internal/infrastructure/http/middleware_test.go
      covers: "Auth middleware + role-based access control"
    - path: backend/internal/infrastructure/websocket/websocket_test.go
      covers: "WebSocket hub: broadcast, subscribe, disconnect"

frontend:
  status: not_scaffolded
  planned:
    framework: React or Next.js
    runner: Vitest
    fallback_runner: Jest
    style: "Component tests with @testing-library/react; Playwright for E2E"
    strict_tdd: "inherits true once runner is detected"

linting:
  backend:
    formatter: gofmt
    linters:
      - go vet
      - "golangci-lint (optional, not configured)"
  frontend:
    status: "not configured — add ESLint + Prettier with the scaffold"

ci_hooks:
  detected: false
  notes: "No .github/workflows visible. backend/scripts/test.sh is the manual entry point."

conventions:
  - "No external JWT libraries — manual HMAC-SHA256 + base64url"
  - "Table-driven tests preferred (Go idiomatic)"
  - "Role check enforced at the application layer before exposing raw device IDs"
  - "Predictive alerts are admin-only — never leak to non-admin responses"
  - "Offline-first on the frontend (localStorage/IndexedDB) is a hard requirement, not optional"
